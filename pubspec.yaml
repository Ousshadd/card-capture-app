
name: card_capture_app
description: "A new Flutter project for business card OCR extraction."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # --- Core Dependencies ---
  # Google ML Kit for on-device OCR
  google_mlkit_text_recognition: ^0.11.0
  
  # Plugin for picking images from camera or gallery
  image_picker: ^1.1.0
  
  # SQLite for local database
  sqflite: ^2.3.0
  
  # Utility for file paths
  path: ^1.9.0

  # iOS style icons
  cupertino_icons: ^1.0.8
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true